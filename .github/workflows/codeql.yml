name: CodeQL

# Static security analysis of the plain-JS userscripts. No build step is needed —
# CodeQL scans the .user.js sources directly.
#
# Note: Dependabot is intentionally NOT configured for this repo. There is no
# package.json / lockfile; runtime dependencies are pulled at load time via
# Tampermonkey @require/@resource from CDNs, which Dependabot's ecosystems do not
# track. Dependency currency is managed by bumping those @require URLs by hand.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 1"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # javascript-typescript is CodeQL's identifier for the JS/TS analyzer; it
        # covers the plain-JS .user.js scripts.
        language: [javascript-typescript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
